<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magazine Layout Planner</title>
<style>
@media print {
  @page{size:8.5in 11in;margin:0.5in;}
  #left,#right-top,#legend-bar,#h1-bar{display:none!important;}
  #page{display:block!important;}
  #right{overflow:visible!important;background:white!important;padding:0!important;display:block!important;}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact;overflow:visible!important;height:auto!important;background:white!important;}
  html{overflow:visible!important;height:auto!important;}
  #grid{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:8px!important;flex:none!important;}
  .story-block{display:contents!important;}
  .spread-wrap{display:flex!important;flex-direction:column!important;gap:2px!important;break-inside:avoid!important;}
  .block-handle-row{display:none!important;}
  .page-cell{flex:1!important;min-height:120px!important;}
  #print-header{display:block!important;}
  #print-legend{display:flex!important;}
}
@media screen{
  #print-header{display:none!important;}
  #print-legend{display:none!important;}
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f4f0;--bg-tertiary:#efede8;
  --text-primary:#1a1a18;--text-secondary:#6b6a65;--text-tertiary:#9e9d98;
  --border-light:rgba(0,0,0,0.09);--border-mid:rgba(0,0,0,0.16);
  --radius-md:8px;--accent:#378ADD;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1e1e1c;--bg-secondary:#272724;--bg-tertiary:#2e2e2b;
    --text-primary:#e8e6e0;--text-secondary:#9e9d98;--text-tertiary:#6b6a65;
    --border-light:rgba(255,255,255,0.07);--border-mid:rgba(255,255,255,0.13);
  }
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text-primary);font-size:14px;line-height:1.5;display:flex;flex-direction:column;}
#h1-bar{background:var(--bg-primary);border-bottom:0.5px solid var(--border-light);padding:11px 18px;display:flex;align-items:baseline;gap:10px;flex-shrink:0;}
#h1-bar h1{font-size:14px;font-weight:600;}
#h1-bar .subtitle{font-size:11px;color:var(--text-tertiary);}
#page{display:flex;flex:1;overflow:hidden;}
#left{width:290px;flex-shrink:0;border-right:0.5px solid var(--border-light);display:flex;flex-direction:column;background:var(--bg-primary);}
#left-top{padding:12px;border-bottom:0.5px solid var(--border-light);flex-shrink:0;}
#left-top h2{font-size:12px;font-weight:600;margin-bottom:10px;}
#add-form{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
#add-title{width:100%;font-size:11px;padding:5px 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;}
#add-title::placeholder{color:var(--text-tertiary);}
#add-row{display:flex;gap:5px;}
#add-type,#add-pages{font-size:11px;padding:4px 5px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;}
#add-type{flex:1;}#add-pages{width:54px;}
#add-btn{font-size:11px;padding:4px 10px;cursor:pointer;border-radius:var(--radius-md);border:0.5px solid var(--border-mid);background:var(--bg-primary);color:var(--text-primary);white-space:nowrap;font-family:inherit;}
#add-btn:hover{background:var(--bg-secondary);}
#csv-row{display:flex;gap:5px;align-items:center;padding-top:6px;border-top:0.5px solid var(--border-light);}
#csv-browse-btn{flex:1;font-size:11px;padding:5px 8px;cursor:pointer;border-radius:var(--radius-md);border:0.5px dashed var(--border-mid);background:var(--bg-secondary);color:var(--text-secondary);text-align:center;font-family:inherit;}
#csv-browse-btn:hover{background:var(--bg-tertiary);}
#csv-file-input{display:none;}
#csv-status{font-size:10px;color:var(--text-tertiary);}
#story-entries{flex:1;overflow-y:auto;padding:8px;}
.entry-row{display:flex;align-items:center;gap:4px;padding:4px 5px;margin-bottom:3px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-primary);transition:opacity 0.1s,border-color 0.1s;}
.entry-row.dragging{opacity:0.2;}
.entry-row.drop-above{border-top:2px solid var(--accent);}
.entry-row.drop-below{border-bottom:2px solid var(--accent);}
.drag-handle{font-size:13px;color:var(--text-tertiary);cursor:grab;flex-shrink:0;padding:0 2px;line-height:1;touch-action:none;}
.drag-handle:hover{color:var(--text-secondary);}
.drag-handle:active{cursor:grabbing;}
.entry-num{font-size:10px;color:var(--text-tertiary);min-width:14px;text-align:right;flex-shrink:0;}
.entry-title{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.entry-badge{font-size:10px;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.entry-pages{font-size:10px;color:var(--text-tertiary);flex-shrink:0;}
.entry-del{font-size:10px;color:var(--text-tertiary);cursor:pointer;flex-shrink:0;padding:0 2px;border:none;background:none;font-family:inherit;}
.entry-del:hover{color:#A32D2D;}
#apply-btn{margin:8px;font-size:12px;padding:7px;cursor:pointer;border-radius:var(--radius-md);font-weight:600;border:0.5px solid var(--border-mid);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;width:calc(100% - 16px);}
#apply-btn:hover{background:var(--bg-secondary);}
#right{flex:1;overflow:auto;background:var(--bg-tertiary);padding:14px;display:flex;flex-direction:column;}
#right-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0;}
#right-top label{font-size:11px;color:var(--text-secondary);}
#pg-input{width:60px;font-size:11px;padding:4px 5px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);}
.top-btn{font-size:11px;padding:4px 9px;cursor:pointer;border-radius:var(--radius-md);border:0.5px solid var(--border-mid);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;}
.top-btn:hover{background:var(--bg-secondary);}
#status{font-size:11px;color:var(--text-secondary);margin-left:auto;}
#legend-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;flex-shrink:0;}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-secondary);}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.leg-hint{font-size:10px;color:var(--text-tertiary);margin-left:6px;padding-left:8px;border-left:0.5px solid var(--border-light);}
#grid{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;align-content:flex-start;flex:1;}
.story-block{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;position:relative;padding:4px;border-radius:8px;border:2px solid transparent;transition:border-color 0.1s,background 0.1s,opacity 0.1s;}
.story-block.dragging{opacity:0.2;}
.story-block.drop-before{border-left-color:var(--accent);background:rgba(55,138,221,0.04);}
.story-block.drop-after{border-right-color:var(--accent);background:rgba(55,138,221,0.04);}
.block-handle-row{position:absolute;top:4px;left:8px;pointer-events:none;z-index:2;}
.grid-handle{font-size:12px;color:var(--text-tertiary);cursor:grab;padding:1px 3px;border-radius:3px;line-height:1;touch-action:none;pointer-events:all;background:var(--bg-primary);border:0.5px solid var(--border-light);opacity:0.85;}
.grid-handle:hover{opacity:1;color:var(--text-secondary);}
.grid-handle:active{cursor:grabbing;}
.spread-wrap{flex:0 0 auto;display:flex;flex-direction:column;gap:2px;}
.spread-label{font-size:9px;color:var(--text-tertiary);letter-spacing:0.03em;white-space:nowrap;}
.spread{display:flex;border:0.5px solid var(--border-mid);border-radius:6px;overflow:hidden;background:var(--bg-primary);}
.spread.is-cover{border-color:#888780;}
.page-cell{flex:0 0 72px;min-height:100px;display:flex;flex-direction:column;}
.page-cell.left-page{border-right:2px solid var(--border-mid);}
.page-cell.fixed-cover{background:#E8E6DF;}
.pg-num{font-size:9px;color:var(--text-tertiary);padding:3px 4px 1px;line-height:1;flex-shrink:0;}
.pg-num.right-num{text-align:right;}
.pg-num.cover-num{color:#5F5E5A;font-weight:500;}
.pg-content{flex:1;padding:2px 4px 4px;display:flex;flex-direction:column;gap:2px;}
.story-chip{border-radius:3px;padding:3px 4px;font-size:10px;font-weight:500;line-height:1.3;word-break:break-word;}
.story-chip.cont{opacity:0.45;font-style:italic;font-weight:400;}
.fixed-label{font-size:10px;font-weight:500;color:#5F5E5A;font-style:italic;padding:2px 0;}
.spine{width:4px;flex-shrink:0;background:var(--border-light);}
.spine.cover-spine{background:#888780;opacity:0.8;}
#print-header{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #ccc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#print-header h2{font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:2px;}
#print-header p{font-size:10px;color:#6b6a65;}
#print-legend{flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.print-leg{display:flex;align-items:center;gap:4px;font-size:9px;color:#444;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.print-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>
<div id="h1-bar">
  <h1>Magazine Layout Planner</h1>
  <span class="subtitle">Blair Academy Bulletin</span>
</div>
<div id="page">
<div id="left">
  <div id="left-top">
    <h2>Story list</h2>
    <div id="add-form">
      <input type="text" id="add-title" placeholder="Story title...">
      <div id="add-row">
        <select id="add-type">
          <option value="boilerplate">Boilerplate</option>
          <option value="feature">Feature</option>
          <option value="coverstory">Cover story</option>
          <option value="ad">Ad</option>
        </select>
        <select id="add-pages">
          <option value="1">1p</option><option value="2" selected>2p</option>
          <option value="3">3p</option><option value="4">4p</option>
          <option value="5">5p</option><option value="6">6p</option>
          <option value="7">7p</option><option value="8">8p</option>
          <option value="9">9p</option><option value="10">10p</option>
          <option value="12">12p</option><option value="16">16p</option>
          <option value="24">24p</option>
        </select>
        <button id="add-btn">+ Add</button>
      </div>
    </div>
    <div id="csv-row">
      <button id="csv-browse-btn">Import CSV</button>
      <input type="file" id="csv-file-input" accept=".csv">
      <span id="csv-status"></span>
    </div>
  </div>
  <div id="story-entries"></div>
  <button id="apply-btn">Build layout</button>
</div>
<div id="right">
  <div id="right-top">
    <label>Page target:</label>
    <input type="number" id="pg-input" min="4" max="300" step="2">
    <button class="top-btn" id="export-pdf-btn">Export PDF (8.5&times;11)</button>
    <button class="top-btn" id="export-txt-btn">Export text</button>
    <span id="status"></span>
  </div>
  <div id="legend-bar">
    <div class="leg"><div class="leg-dot" style="background:#888780;"></div>Fixed covers</div>
    <div class="leg"><div class="leg-dot" style="background:#D85A30;"></div>Cover story</div>
    <div class="leg"><div class="leg-dot" style="background:#378ADD;"></div>Feature</div>
    <div class="leg"><div class="leg-dot" style="background:#639922;"></div>Boilerplate</div>
    <div class="leg"><div class="leg-dot" style="background:#BA7517;"></div>Ad</div>
    <span class="leg-hint">Drag &#x283F; in either panel to reorder</span>
  </div>
  <div id="print-header">
    <h2>Magazine Layout Planner</h2>
    <p id="print-subtitle">Blair Academy Bulletin</p>
  </div>
  <div id="print-legend">
    <div class="print-leg"><div class="print-leg-dot" style="background:#888780;"></div>Fixed covers</div>
    <div class="print-leg"><div class="print-leg-dot" style="background:#D85A30;"></div>Cover story</div>
    <div class="print-leg"><div class="print-leg-dot" style="background:#378ADD;"></div>Feature</div>
    <div class="print-leg"><div class="print-leg-dot" style="background:#639922;"></div>Boilerplate</div>
    <div class="print-leg"><div class="print-leg-dot" style="background:#BA7517;"></div>Ad</div>
  </div>
  <div id="grid"></div>
</div>
</div>
<script>
let stories=[],storyOrder=[],idSeq=0;
let dragId=null,dragEl=null,ghostEl=null,ptrOffX=0,ptrOffY=0,dragMode=null;
const TYPE_MAP={
  coverstory:{bg:'#FAECE7',color:'#712B13',label:'Cover story'},
  feature:{bg:'#E6F1FB',color:'#0C447C',label:'Feature'},
  boilerplate:{bg:'#EAF3DE',color:'#27500A',label:'Boilerplate'},
  ad:{bg:'#FAEEDA',color:'#633806',label:'Ad'},
};
function chipStyle(t){const x=TYPE_MAP[t]||TYPE_MAP.boilerplate;return`background:${x.bg};color:${x.color};`;}
function calcTotal(){const i=storyOrder.reduce((a,id)=>{const s=stories.find(x=>x.id===id);return a+(s?s.pages:0);},0);return i+4;}
function syncPageTarget(){document.getElementById('pg-input').value=calcTotal();}
function isCoverRowCSV(s,ti){
  s=(s||'').toLowerCase().trim();ti=(ti||'').toLowerCase().trim();
  if(['inside cover','outside back cover','ifc','ibc','inside back cover','inside front cover'].includes(s))return true;
  if(['front cover','back cover','inside front cover','inside back cover','remittance envelope'].includes(ti))return true;
  if(s.includes('outside back')||ti.includes('back cover/alumni')||ti.includes('inside cover (2-page'))return true;
  return false;
}
function guessType(s,ti){
  s=(s||'').toLowerCase();ti=(ti||'').toLowerCase();
  if(s.includes('feature'))return'feature';
  if(s.includes('cover story')||ti.includes('cover story'))return'coverstory';
  if(s.includes('ad')||ti.includes('blair fund ad'))return'ad';
  return'boilerplate';
}
function getSidebarTargets(){return[...document.querySelectorAll('.entry-row[data-id]')];}
function getGridTargets(){return[...document.querySelectorAll('.story-block[data-id]')];}
function clearHL(){getSidebarTargets().forEach(el=>el.classList.remove('drop-above','drop-below'));getGridTargets().forEach(el=>el.classList.remove('drop-before','drop-after'));}
function sidebarTargetAtY(y){return getSidebarTargets().find(el=>{const r=el.getBoundingClientRect();return y>=r.top&&y<=r.bottom;})||null;}
function gridTargetAtX(x){for(const b of getGridTargets()){const r=b.getBoundingClientRect();if(x>=r.left&&x<=r.right)return{el:b,before:x<r.left+r.width/2};}return null;}
function onPtrMove(e){
  if(!dragEl)return;e.preventDefault();
  ghostEl.style.left=(e.clientX-ptrOffX)+'px';ghostEl.style.top=(e.clientY-ptrOffY)+'px';
  clearHL();
  if(dragMode==='sidebar'){const t=sidebarTargetAtY(e.clientY);if(t&&t.dataset.id!==dragId){const r=t.getBoundingClientRect();t.classList.add(e.clientY<r.top+r.height/2?'drop-above':'drop-below');}}
  else{const hit=gridTargetAtX(e.clientX);if(hit&&hit.el.dataset.id!==dragId)hit.el.classList.add(hit.before?'drop-before':'drop-after');}
}
function onPtrUp(e){
  if(!dragEl)return;
  document.removeEventListener('pointermove',onPtrMove);document.removeEventListener('pointerup',onPtrUp);
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  dragEl.classList.remove('dragging');clearHL();
  if(dragMode==='sidebar'){const t=sidebarTargetAtY(e.clientY);if(t&&t.dataset.id!==dragId){const r=t.getBoundingClientRect();doReorder(dragId,t.dataset.id,e.clientY<r.top+r.height/2);}}
  else{const hit=gridTargetAtX(e.clientX);if(hit&&hit.el.dataset.id!==dragId)doReorder(dragId,hit.el.dataset.id,hit.before);}
  dragEl=null;dragId=null;dragMode=null;
}
function doReorder(fromId,toId,before){
  const si=storyOrder.indexOf(fromId);storyOrder.splice(si,1);
  const ti=storyOrder.indexOf(toId);storyOrder.splice(before?ti:ti+1,0,fromId);
  renderEntries();renderGrid();
}
function startDrag(e,id,el,mode,title,pages){
  e.preventDefault();e.stopPropagation();
  dragId=id;dragEl=el;dragMode=mode;
  const rect=el.getBoundingClientRect();ptrOffX=e.clientX-rect.left;ptrOffY=e.clientY-rect.top;
  ghostEl=document.createElement('div');
  ghostEl.style.cssText=`position:fixed;pointer-events:none;z-index:9999;min-width:140px;max-width:260px;opacity:0.93;left:${e.clientX-ptrOffX}px;top:${e.clientY-ptrOffY}px;background:var(--bg-primary);border-radius:6px;border:1.5px solid #378ADD;padding:5px 10px;font-size:11px;font-weight:500;color:var(--text-secondary);box-shadow:0 4px 16px rgba(0,0,0,0.15);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;`;
  ghostEl.textContent=title+' ('+pages+'p)';
  document.body.appendChild(ghostEl);el.classList.add('dragging');
  document.addEventListener('pointermove',onPtrMove,{passive:false});document.addEventListener('pointerup',onPtrUp);
}
function makeEntryRow(story,index){
  const row=document.createElement('div');row.className='entry-row';row.dataset.id=story.id;
  const h=document.createElement('span');h.className='drag-handle';h.textContent='\u283F';h.title='Drag to reorder';h.style.touchAction='none';
  h.addEventListener('pointerdown',e=>startDrag(e,story.id,row,'sidebar',story.title,story.pages));
  const num=document.createElement('div');num.className='entry-num';num.textContent=index+1+'';
  const t=document.createElement('div');t.className='entry-title';t.textContent=story.title;t.title=story.title;
  const badge=document.createElement('span');badge.className='entry-badge';badge.style.cssText=chipStyle(story.type);badge.textContent=(TYPE_MAP[story.type]||TYPE_MAP.boilerplate).label;
  const pg=document.createElement('span');pg.className='entry-pages';pg.textContent=story.pages+'p';
  const del=document.createElement('button');del.className='entry-del';del.textContent='\u2715';
  del.onclick=()=>{stories=stories.filter(s=>s.id!==story.id);storyOrder=storyOrder.filter(id=>id!==story.id);renderEntries();syncPageTarget();renderGrid();};
  row.appendChild(h);row.appendChild(num);row.appendChild(t);row.appendChild(badge);row.appendChild(pg);row.appendChild(del);
  return row;
}
function renderEntries(){
  const el=document.getElementById('story-entries');el.innerHTML='';
  if(!storyOrder.length){el.innerHTML='<div style="font-size:11px;color:var(--text-tertiary);padding:10px 6px;">Add a story above or import a CSV. Drag \u283F to reorder.</div>';return;}
  storyOrder.forEach((id,i)=>{const s=stories.find(x=>x.id===id);if(s)el.appendChild(makeEntryRow(s,i));});
}
function addStory(){
  const title=document.getElementById('add-title').value.trim();if(!title)return;
  const type=document.getElementById('add-type').value;
  const pages=parseInt(document.getElementById('add-pages').value)||2;
  const s={id:'s'+(++idSeq),title,type,pages};
  stories.push(s);storyOrder.push(s.id);
  document.getElementById('add-title').value='';
  renderEntries();syncPageTarget();renderGrid();
}
function splitCSV(line){const cols=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;continue;}if(ch===','&&!inQ){cols.push(cur);cur='';continue;}cur+=ch;}cols.push(cur);return cols;}
function parseCSV(text){
  const lines=text.split(/\r?\n/);let hdr=-1,cA=-1,cS=-1,cP=-1;
  for(let i=0;i<Math.min(lines.length,6);i++){const cols=splitCSV(lines[i]);const ai=cols.findIndex(c=>/article/i.test(c.trim()));if(ai>=0){hdr=i;cA=ai;cS=cols.findIndex(c=>/section/i.test(c.trim()));cP=cols.findIndex(c=>/pg.?ct|pages/i.test(c.trim()));break;}}
  if(hdr<0){alert('No Article column found.');return;}
  let count=0,skipped=0;
  for(let i=hdr+1;i<lines.length;i++){
    const cols=splitCSV(lines[i]);const title=(cA>=0?cols[cA]||'':'').trim();if(!title)continue;
    const section=cS>=0?(cols[cS]||'').trim():'';
    if(isCoverRowCSV(section,title)){skipped++;continue;}
    let pages=Math.round(parseFloat(cP>=0?(cols[cP]||'0').trim():'0')||0);if(pages<1)pages=1;
    const s={id:'s'+(++idSeq),title,type:guessType(section,title),pages};
    stories.push(s);storyOrder.push(s.id);count++;
  }
  document.getElementById('csv-status').textContent=count+' imported'+(skipped?' \u00b7 '+skipped+' skipped':'');
  renderEntries();syncPageTarget();renderGrid();
}
function makeFixedCell(label,isLeft){
  const cell=document.createElement('div');cell.className='page-cell fixed-cover'+(isLeft?' left-page':'');
  const pn=document.createElement('div');pn.className='pg-num cover-num'+(!isLeft?' right-num':'');pn.textContent=label;cell.appendChild(pn);
  const ct=document.createElement('div');ct.className='pg-content';
  const lb=document.createElement('div');lb.className='fixed-label';lb.textContent=label;ct.appendChild(lb);
  cell.appendChild(ct);return cell;
}
function makePageCell(pg,isLeft,pageMap){
  const cell=document.createElement('div');cell.className='page-cell '+(isLeft?'left-page':'right-page');
  const pn=document.createElement('div');pn.className='pg-num'+(!isLeft?' right-num':'');pn.textContent=pg;cell.appendChild(pn);
  const ct=document.createElement('div');ct.className='pg-content';
  const e=pageMap[pg];
  if(e){const c=document.createElement('div');c.className='story-chip'+(e.isStart?'':' cont');c.style.cssText=chipStyle(e.story.type);
    if(e.isStart){c.textContent=e.story.title;if(e.story.pages>1){const b=document.createElement('span');b.textContent=' ['+e.story.pages+'p]';b.style.cssText='font-size:9px;opacity:0.6;font-weight:400;';c.appendChild(b);}}
    else c.textContent='\u2014 cont.';ct.appendChild(c);}
  cell.appendChild(ct);return cell;
}
function makeSpreadWrap(lc,rc,label,isCover){
  const w=document.createElement('div');w.className='spread-wrap';
  const lb=document.createElement('div');lb.className='spread-label';lb.textContent=label;w.appendChild(lb);
  const sd=document.createElement('div');sd.className='spread'+(isCover?' is-cover':'');
  sd.appendChild(lc);
  if(rc){const sp=document.createElement('div');sp.className='spine'+(isCover?' cover-spine':'');sd.appendChild(sp);sd.appendChild(rc);}
  w.appendChild(sd);return w;
}
function makeSoloWrap(label){
  const w=document.createElement('div');w.className='spread-wrap';
  const lb=document.createElement('div');lb.className='spread-label';lb.textContent=label;w.appendChild(lb);
  const sd=document.createElement('div');sd.className='spread is-cover';sd.appendChild(makeFixedCell(label,true));
  w.appendChild(sd);return w;
}
function renderGrid(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  const interior=storyOrder.reduce((a,id)=>{const s=stories.find(x=>x.id===id);return a+(s?s.pages:0);},0);
  if(interior===0&&storyOrder.length===0){
    const es=document.createElement('div');
    es.style.cssText='display:flex;align-items:center;justify-content:center;flex:1;font-size:13px;color:var(--text-tertiary);text-align:center;padding:40px;width:100%;';
    es.textContent='Add stories on the left to build your layout.';
    grid.appendChild(es);return;
  }
  const pageMap={};let pNum=1;
  storyOrder.forEach(id=>{const s=stories.find(x=>x.id===id);if(!s)return;for(let i=0;i<s.pages;i++){pageMap[pNum]={story:s,isStart:i===0};pNum++;}});
  const N=pNum-1;
  const vList=['IFC'];for(let p=1;p<=N;p++)vList.push(p);vList.push('IBC');
  const allSpreads=[];
  for(let i=0;i<vList.length;i+=2){
    const lp=vList[i];const rp=i+1<vList.length?vList[i+1]:null;
    let label='';
    if(lp==='IFC')label='IFC'+(rp!==null?' \u2013'+(typeof rp==='number'?rp:rp):'');
    else if(rp==='IBC')label=lp+' \u2013 IBC';
    else if(rp===null)label=''+lp;
    else label=lp+' \u2013 '+rp;
    allSpreads.push({lp,rp,label});
  }
  function storyOfSpread(sp){const pg=typeof sp.lp==='number'?sp.lp:typeof sp.rp==='number'?sp.rp:null;return pg&&pageMap[pg]?pageMap[pg].story:null;}
  const blocks=[];let i=0;
  while(i<allSpreads.length){
    const sp=allSpreads[i];const story=storyOfSpread(sp);
    if(!story){blocks.push({story:null,spreads:[sp]});i++;continue;}
    const grp=[sp];i++;
    while(i<allSpreads.length){const ns=storyOfSpread(allSpreads[i]);if(ns&&ns.id===story.id){grp.push(allSpreads[i]);i++;}else break;}
    blocks.push({story,spreads:grp});
  }
  grid.appendChild(makeSoloWrap('Front cover'));
  blocks.forEach(block=>{
    const blockEl=document.createElement('div');blockEl.className='story-block';
    if(block.story){
      blockEl.style.cssText='display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;position:relative;';
      blockEl.dataset.id=block.story.id;
      const hr=document.createElement('div');hr.className='block-handle-row';
      const gh=document.createElement('span');gh.className='grid-handle';gh.textContent='\u283F';gh.title='Drag to reorder';gh.style.touchAction='none';
      gh.addEventListener('pointerdown',e=>startDrag(e,block.story.id,blockEl,'grid',block.story.title,block.story.pages));
      hr.appendChild(gh);blockEl.appendChild(hr);
    }
    block.spreads.forEach(sp=>{
      const lc=sp.lp==='IFC'?makeFixedCell('Inside front cover',true):makePageCell(sp.lp,true,pageMap);
      const rc=sp.rp===null?null:sp.rp==='IBC'?makeFixedCell('Inside back cover',false):makePageCell(sp.rp,false,pageMap);
      blockEl.appendChild(makeSpreadWrap(lc,rc,sp.label,false));
    });
    grid.appendChild(blockEl);
  });
  grid.appendChild(makeSoloWrap('Back cover'));
  const total=interior+4;
  document.getElementById('print-subtitle').textContent='Blair Academy Bulletin \u00b7 '+total+' pages \u00b7 '+storyOrder.length+' stories';
  const target=parseInt(document.getElementById('pg-input').value)||total;
  const diff=target-total;
  let st=storyOrder.length+' stories \u00b7 '+total+'pp total ('+interior+'pp interior + 4 covers)';
  if(diff>0)st+=' \u00b7 '+diff+'pp open';else if(diff<0)st+=' \u00b7 '+Math.abs(diff)+'pp over';else st+=' \u00b7 on target';
  document.getElementById('status').textContent=st;
}
document.getElementById('add-btn').onclick=addStory;
document.getElementById('add-title').addEventListener('keydown',e=>{if(e.key==='Enter')addStory();});
document.getElementById('apply-btn').onclick=renderGrid;
document.getElementById('pg-input').addEventListener('input',renderGrid);
document.getElementById('export-pdf-btn').onclick=()=>window.print();
document.getElementById('export-txt-btn').onclick=()=>{
  const pageMap={};let c=1;storyOrder.forEach(id=>{const s=stories.find(x=>x.id===id);if(!s)return;for(let i=0;i<s.pages;i++)pageMap[c+i]={story:s,isStart:i===0};c+=s.pages;});
  const lines=['LAYOUT PLAN','============','Front cover (solo)','IFC \u2013 p.1','...','p.'+(c-1)+' \u2013 IBC','Back cover (solo)','','INTERIOR','--------'];
  for(let p=1;p<c;p+=2){const le=pageMap[p],re=pageMap[p+1];lines.push('pp.'+String(p).padStart(3)+' | '+String(p+1).padStart(3)+'   '+(le?le.isStart?le.story.title:'\u2014 cont.':'\u2014')+' / '+(re?re.isStart?re.story.title:'\u2014 cont.':'\u2014'));}
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='layout_plan.txt';a.click();
};
document.getElementById('csv-browse-btn').onclick=()=>document.getElementById('csv-file-input').click();
document.getElementById('csv-file-input').onchange=function(){if(this.files[0]){document.getElementById('csv-status').textContent='Reading\u2026';const r=new FileReader();r.onload=e=>parseCSV(e.target.result);r.readAsText(this.files[0]);}};
</script>
